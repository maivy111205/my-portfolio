<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đèn Kéo Quân</title>

<style>

body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

.scene{
    width:300px;
    height:300px;
    margin:80px auto;
    perspective:1000px;
}

.carousel{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 10s linear infinite;
}

.face{
    position:absolute;
    width:200px;
    height:200px;
    left:50px;
    top:50px;
}

.face img{
    width:100%;
    height:100%;
    object-fit:cover;
    border:3px solid white;
}

.face:nth-child(1){
transform:rotateY(0deg) translateZ(250px);
}

.face:nth-child(2){
transform:rotateY(60deg) translateZ(250px);
}

.face:nth-child(3){
transform:rotateY(120deg) translateZ(250px);
}

.face:nth-child(4){
transform:rotateY(180deg) translateZ(250px);
}

.face:nth-child(5){
transform:rotateY(240deg) translateZ(250px);
}

.face:nth-child(6){
transform:rotateY(300deg) translateZ(250px);
}

@keyframes spin{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

</style>
</head>

<body>

<h1>Đèn Kéo Quân - Mai Thị Thảo Vy</h1>

<div class="scene">

<div class="carousel" id="carousel">

<div class="face">
<img src="images/hinh1.jpg">
</div>

<div class="face">
<img src="images/hinh2.jpg">
</div>

<div class="face">
<img src="images/hinh3.jpg">
</div>

<div class="face">
<img src="images/hinh4.jpg">
</div>

<div class="face">
<img src="images/hinh5.jpg">
</div>

<div class="face">
<img src="images/hinh6.jpg">
</div>

</div>

</div>

<script>

const carousel =
document.getElementById("carousel");

carousel.addEventListener("mouseenter",()=>{

carousel.style.animationPlayState =
"paused";

});

carousel.addEventListener("mouseleave",()=>{

carousel.style.animationPlayState =
"running";

});

</script>
<h2>Kết quả bài tập 18</h2>

<img src="images/tracnghiem18.jpg" width="500">

</body>
</html>
