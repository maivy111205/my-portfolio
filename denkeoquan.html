<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đèn Kéo Quân - Mai Thị Thảo Vy</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    overflow:hidden;
    font-family:Arial, sans-serif;
}

h1{
    color:#ff4f8b;
}

.scene{
    width:300px;
    height:300px;
    perspective:1000px;
}

.carousel{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 12s infinite linear;
}

.carousel:hover{
    animation-play-state:paused;
}

.carousel img{
    position:absolute;
    width:220px;
    height:220px;
    left:40px;
    top:40px;
    border-radius:15px;
    border:4px solid white;
    object-fit:cover;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

img:nth-child(1){
    transform:rotateY(0deg) translateZ(260px);
}
img:nth-child(2){
    transform:rotateY(60deg) translateZ(260px);
}
img:nth-child(3){
    transform:rotateY(120deg) translateZ(260px);
}
img:nth-child(4){
    transform:rotateY(180deg) translateZ(260px);
}
img:nth-child(5){
    transform:rotateY(240deg) translateZ(260px);
}
img:nth-child(6){
    transform:rotateY(300deg) translateZ(260px);
}

@keyframes spin{
    from{
        transform:rotateY(0deg);
    }
    to{
        transform:rotateY(360deg);
    }
}

.quiz{
    margin-top:50px;
    text-align:center;
}

.quiz img{
    width:300px;
    border-radius:10px;
    border:3px solid white;
}

</style>

</head>
<body>

<h1>Đèn Kéo Quân - Mai Thị Thảo Vy</h1>

<div class="scene">
    <div class="carousel">

        <img src="images/anh1.jpg">
        <img src="images/anh2.jpg">
        <img src="images/anh3.jpg">
        <img src="images/anh4.jpg">
        <img src="images/anh5.jpg">
        <img src="images/anh6.jpg">

    </div>
</div>

<div class="quiz">
    <h2>Kết quả Bài 18</h2>
    <img src="images/quiz.jpg" alt="">
</div>

</body>
</html>
